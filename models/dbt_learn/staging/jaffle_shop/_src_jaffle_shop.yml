sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: primary key for customer data
            data_tests:
              - unique
              - not_null        
      - name: orders
        description: Raw orders data
        columns:
          - name: id
            description: primary key for customer data
            data_tests:
              - unique
              - not_null 
        
        